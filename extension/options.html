<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font: 14px -apple-system, system-ui, sans-serif; max-width: 860px; margin: 24px auto; padding: 0 16px 60px; color: #1a1a1a; }
  h1 { font-size: 18px; } h2 { font-size: 14px; margin: 22px 0 6px; border-bottom: 1px solid #eee; padding-bottom: 4px; color: #333; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
  .f { display: flex; flex-direction: column; } .f.wide { grid-column: 1 / -1; }
  label { font-weight: 600; margin: 10px 0 3px; font-size: 12px; color: #444; }
  input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 8px; font: inherit; box-sizing: border-box; width: 100%; }
  textarea { min-height: 200px; font-family: ui-monospace, monospace; font-size: 12px; }
  textarea.small { min-height: 64px; font-family: inherit; }
  .hint { color: #777; font-size: 12px; font-weight: 400; }
  button { margin-top: 18px; padding: 10px 20px; font-weight: 600; color: #fff; background: #4f8cff; border: none; border-radius: 8px; cursor: pointer; }
  #status { margin-left: 12px; color: #2a8a4a; font-weight: 600; }
  .bar { position: sticky; bottom: 0; background: #fff; padding: 10px 0; border-top: 1px solid #eee; }
</style>
</head>
<body>
  <h1>Job Application Autofill — Settings</h1>

  <div class="grid">
    <div class="f wide"><label>Anthropic API key <span class="hint">(stored locally in this browser only)</span></label>
      <input id="apiKey" type="password" placeholder="sk-ant-..." /></div>
    <div class="f wide"><label>Model</label>
      <select id="model">
        <option value="claude-sonnet-4-6">claude-sonnet-4-6 (faster, cheaper — recommended)</option>
        <option value="claude-opus-4-8">claude-opus-4-8 (highest quality, slower)</option>
      </select></div>
  </div>

  <div id="fields"></div>

  <h2>Resume file <span class="hint">(PDF/DOCX — auto-attached to the upload field)</span></h2>
  <input id="resumeFile" type="file" accept=".pdf,.doc,.docx" />
  <div id="resumeFileName" class="hint" style="margin-top:6px;"></div>

  <h2>Master resume text <span class="hint">(source of truth for tailoring; never trim it)</span></h2>
  <textarea id="resume"></textarea>

  <div class="bar"><button id="save">Save</button>
    <button id="clearLearned" style="background:#aa3333;margin-left:8px;">Clear saved answers</button>
    <span id="status"></span></div>
  <script src="options.js"></script>
</body>
</html>
