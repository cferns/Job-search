<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font: 14px -apple-system, system-ui, sans-serif; max-width: 1100px; margin: 24px auto; padding: 0 16px 60px; color: #1a1a1a; }
  h1 { font-size: 20px; } h2 { font-size: 14px; color: #555; margin: 20px 0 8px; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: top; }
  th { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  td.desc { color: #555; max-width: 420px; }
  a { color: #4f8cff; text-decoration: none; } a:hover { text-decoration: underline; }
  select { padding: 5px; border: 1px solid #ccc; border-radius: 6px; }
  .del { background: none; border: none; color: #c33; cursor: pointer; font-size: 14px; }
  .s-Applied { color: #2a8a4a; font-weight: 600; } .s-Skipped { color: #999; }
  #empty { color: #888; margin-top: 16px; }
  .stats { color: #555; font-size: 13px; margin-top: 6px; }
  .nav { display: flex; gap: 6px; margin-bottom: 14px; }
  .nav a { padding: 8px 14px; border-radius: 8px; text-decoration: none; color: #333; background: #eee; font-weight: 600; }
  .nav a.active { background: #4f8cff; color: #fff; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #cfd8e8; border-top-color: #4f8cff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-left: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="nav"><a href="jobs.html" class="active">📋 Job Session</a><a href="options.html">⚙ Settings</a></div>
  <h1>Job Search Session</h1>
  <div style="margin-top:8px;">
    <button id="findJobs" style="background:#2a8a4a;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:600;cursor:pointer;">🔎 Search the web for new jobs</button>
    <button id="refresh" style="background:#4f8cff;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:600;cursor:pointer;margin-left:8px;">🔄 Refresh &amp; sort by fit</button>
  </div>
  <div style="margin-top:10px;">
    <input id="companies" placeholder="Search specific companies, comma separated (e.g. Databricks, Snowflake, Anthropic)" style="width:55%;padding:8px;border:1px solid #ccc;border-radius:8px;" />
    <button id="searchCompanies" style="background:#6f5cff;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-weight:600;cursor:pointer;margin-left:8px;">🏢 Search these companies</button>
  </div>
  <div style="margin-top:12px;">
    <input id="filterText" placeholder="Filter by company / role…" style="padding:7px;border:1px solid #ccc;border-radius:8px;width:32%" />
    <select id="filterStatus" style="padding:7px;border:1px solid #ccc;border-radius:8px;margin-left:6px"><option>All</option><option>Pending</option><option>Applied</option><option>Skipped</option></select>
    <select id="sortBy" style="padding:7px;border:1px solid #ccc;border-radius:8px;margin-left:6px"><option value="fit">Sort: Best fit</option><option value="date">Sort: Newest</option><option value="company">Sort: Company</option></select>
  </div>
  <div class="stats" id="stats"></div><span id="dspin" class="spinner" style="display:none"></span>
  <table>
    <thead><tr><th>Company</th><th>Role / Link</th><th>Added</th><th>Description</th><th title="Confidence of landing an interview given your experience + current market">Fit</th><th>Status</th><th>Auto-apply</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div id="empty">No jobs yet. Use the search buttons, open postings, then click Tailor &amp; Fill on a posting.</div>

  <h2 style="margin-top:26px;">Saved tailored documents <span class="hint" style="color:#888;font-weight:400;font-size:12px;">(by company · title · timestamp)</span></h2>
  <div id="archive"></div>

  <script src="core.js"></script>
  <script src="jobs.js"></script>
</body>
</html>
