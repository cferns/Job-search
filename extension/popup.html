<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { width: 320px; font: 13px -apple-system, system-ui, sans-serif; margin: 0; padding: 14px; color: #1a1a1a; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  button { width: 100%; padding: 10px; font-size: 14px; font-weight: 600; color: #fff;
           background: #4f8cff; border: none; border-radius: 8px; cursor: pointer; }
  button:disabled { background: #9bbcf5; cursor: default; }
  #status { margin-top: 10px; font-size: 12px; color: #444; white-space: pre-wrap; line-height: 1.4; }
  a { color: #4f8cff; font-size: 12px; text-decoration: none; }
  .row { margin-top: 10px; text-align: center; }
</style>
</head>
<body>
  <h1>Job Application Autofill</h1>
  <button id="fill">Tailor &amp; Fill this form</button>
  <button id="saveAns" style="margin-top:8px;background:#2a8a4a;">Save answers from this page</button>
  <div id="status">Open a job application page, then click the button.</div>
  <div class="row"><a id="opts" href="#">Settings (API key, resume, profile)</a></div>
  <script src="popup.js"></script>
</body>
</html>
