# Copy this file to `config/profile.yaml` and fill it in. profile.yaml is gitignored
# (it contains personal data). These values answer the common application form fields.

# Identity
first_name: "Clinton"
last_name: "Fernandes"
full_name: "Clinton Fernandes"
email: "clintonfernandes4u@gmail.com"
phone: ""                       # e.g. "+1 612 555 0100"

# Location
location: "Minneapolis, MN"     # free-text, used for "Location" fields
city: "Minneapolis"
state: "MN"
country: "United States"

# Links
linkedin: ""                    # https://www.linkedin.com/in/...
github: ""
portfolio: ""                   # personal site / portfolio URL

# Professional snapshot
