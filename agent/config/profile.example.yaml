# Copy this file to `config/profile.yaml` and fill it in. profile.yaml is gitignored
# (it contains personal data). These values answer the common application form fields.

# Identity
first_name: "Clinton"
last_name: "Fernandes"
full_name: "Clinton Fernandes"
email: "clintonfernandes4u@gmail.com"
phone: ""                       # e.g. "+1 612 555 0100"

# Location
location: "Minneapolis, MN"     # free-text, used for "Location" fields
city: "Minneapolis"
state: "MN"
country: "United States"

# Links
linkedin: ""                    # https://www.linkedin.com/in/...
github: ""
portfolio: ""                   # personal site / portfolio URL

# Professional snapshot
current_title: "Lead Technical Program Manager"
current_company: "Target"
years_experience: "8"
desired_salary: ""              # leave blank to skip, or e.g. "180000"

# Work authorization (common screener questions)
# Set these truthfully — they drive how the agent answers form questions like
# "Will you now or in the future require sponsorship?".
work_authorized: true           # currently authorized to work (e.g. on a current visa)
needs_sponsorship: true         # requires H1B (or other) visa sponsorship now or in future
# NOTE: visa status is deliberately NOT mentioned in cover letters (it can hurt) —
# it's only used to answer the explicit work-authorization form field.

# Path to the resume PDF to upload. Leave blank to upload the auto-generated,
# per-job tailored PDF (recommended). Set a path to always upload a fixed file.
resume_pdf: ""

# Path to your master resume (markdown) used as the tailoring source of truth.
# Relative paths are resolved from the repository root.
master_resume: "resume/master-resume.md"

# EEO / self-identification (US). Defaults decline to answer — change if you wish.
gender: "Decline to self-identify"
race: "Decline to self-identify"
veteran_status: "I am not a protected veteran"
disability: "Decline to self-identify"
pronouns: ""

# Optional: a short note appended to every cover letter prompt as extra context.
# Set to signal a remote preference so tailoring/cover letters emphasize remote fit.
extra_context: "Seeking fully remote roles (US-based). Comfortable leading distributed, cross-functional teams across time zones — proven in current role aligning 400+ stakeholders remotely."
