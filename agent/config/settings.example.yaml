# Copy this file to `config/settings.yaml` and adjust. settings.yaml is gitignored.

# Submission behavior:
#   review  - agent fills everything, then pauses for you to review and submit (SAFE default)
#   auto    - agent clicks submit without review (higher risk; use sparingly)
#   draft   - agent only generates tailored resume + cover letter, no browser/form filling
submit_mode: "review"

# Anthropic model used for tailoring. Default is the most capable model.
# Override only if you explicitly want a cheaper/faster one (e.g. "claude-sonnet-4-6").
model: "claude-opus-4-8"

# Where tailored resumes/cover letters are written (relative to repo root).
output_dir: "resume/tailored"

# Tracker CSV to append every application to (relative to repo root).
tracker_csv: "applications.csv"

# Playwright persistent profile dir (keeps you logged in across runs). Gitignored.
browser_profile_dir: "agent/.browser-profile"

# Run the browser visibly (required for review mode so you can see/submit).
headless: false

# After each application (review mode), ask a couple of quick feedback questions and
# remember your answers/corrections so the agent fills more next time. Set false to skip.
collect_feedback: true

# Auto-answer required essay / free-text questions (e.g. "something you've built using AI")
# with Claude, grounded in your master resume. Lets auto mode submit more without stopping.
# Set false if you'd rather write every essay yourself.
auto_answer_questions: true
